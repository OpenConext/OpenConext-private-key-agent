parameters:
    log_level_default: 'info'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    OpenConext\PrivateKeyAgent\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    # Config provider as singleton
    OpenConext\PrivateKeyAgent\Config\ConfigProvider:
        lazy: true
        arguments:
            $configPath: '%env(string:PRIVATE_KEY_AGENT_CONFIG)%'

    # Expose AgentConfig from the provider
    OpenConext\PrivateKeyAgent\Config\AgentConfig:
        factory: ['@OpenConext\PrivateKeyAgent\Config\ConfigProvider', 'getConfig']

    # Create and populate KeyRegistry using KeyRegistryBootstrapper factory
    OpenConext\PrivateKeyAgent\Service\KeyRegistry:
        factory: ['@OpenConext\PrivateKeyAgent\Service\KeyRegistryBootstrapper', 'createRegistry']
        arguments:
            - '@OpenConext\PrivateKeyAgent\Config\AgentConfig'

    # Wiring for services that need AgentConfig
    OpenConext\PrivateKeyAgent\Security\TokenAuthenticator:
        arguments:
            $config: '@OpenConext\PrivateKeyAgent\Config\AgentConfig'

    OpenConext\PrivateKeyAgent\EventSubscriber\ExceptionSubscriber:
        arguments:
            $config: '@OpenConext\PrivateKeyAgent\Config\AgentConfig'

    OpenConext\PrivateKeyAgent\Security\AuthenticatorInterface: '@OpenConext\PrivateKeyAgent\Security\TokenAuthenticator'
    OpenConext\PrivateKeyAgent\Security\AccessControlInterface: '@OpenConext\PrivateKeyAgent\Security\AccessControlService'
