[www]
; Static pool for predictable performance
pm = static
pm.max_children = 16

; Prevent memory leaks by recycling workers
pm.max_requests = 10000

; Access log to stdout for container logging
access.log = /dev/stdout
access.format = '{"time":"%{%Y-%m-%dT%H:%M:%S%z}T","method":"%m","uri":"%r","status":"%s","duration":"%d","memory":"%{mega}M"}'
