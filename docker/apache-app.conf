<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride None
        Require all granted
        FallbackResource /index.php
    </Directory>

    # Pass the Authorization header through to PHP (stripped by default in some configs)
    SetEnvIfNoCase Authorization "(.+)" HTTP_AUTHORIZATION=$1

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
