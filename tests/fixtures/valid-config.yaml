agent_name: test-agent

backend_groups:
  - name: soft-key-1
    type: openssl
    key_path: /tmp/test-key.pem

keys:
  - name: my-key
    signing_backends:
      - soft-key-1
    decryption_backends:
      - soft-key-1

clients:
  - name: test-client
    token: test-token-value-at-least-32-chars-long
    allowed_keys:
      - my-key
