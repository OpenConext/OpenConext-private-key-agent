name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: dev
          load: true
          tags: openconext-private-key-agent-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run checks (lint + static analysis + audit + tests)
        run: docker run --rm openconext-private-key-agent-app:latest composer check

  coverage:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: dev
          load: true
          tags: openconext-private-key-agent-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests with coverage
        run: |
          docker run --rm \
            -e XDEBUG_MODE=coverage \
            -v "${{ github.workspace }}/coverage:/var/www/html/var/coverage" \
            openconext-private-key-agent-app:latest \
            composer test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/clover.xml
          retention-days: 14

      - name: Generate coverage badge
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, json, os
          root = ET.parse('coverage/clover.xml').getroot()
          m = root.find('./project/metrics')
          stmts = int(m.get('statements'))
          covered = int(m.get('coveredstatements'))
          pct = round(covered / stmts * 100, 1) if stmts > 0 else 0
          color = 'brightgreen' if pct >= 90 else 'green' if pct >= 80 else 'yellow' if pct >= 70 else 'orange' if pct >= 60 else 'red'
          os.makedirs('.github/badges', exist_ok=True)
          with open('.github/badges/coverage.json', 'w') as f:
              json.dump({'schemaVersion': 1, 'label': 'coverage', 'message': f'{pct}%', 'color': color}, f, indent=2)
          print(f'Coverage: {pct}% ({color})')
          EOF

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge [skip ci]"
          file_pattern: .github/badges/coverage.json

  smoke-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Set up dev environment (keys + config)
        run: |
          ./tools/setup-dev.sh
          chmod 644 config/keys/*.pem

      - name: Build and start services
        run: docker compose -f compose.ci.yaml up -d --build --wait

      - name: Wait for service to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/v1/health > /dev/null 2>&1; then
              echo "Service is healthy"
              exit 0
            fi
            echo "Waiting for service... ($i/30)"
            sleep 2
          done
          echo "Service failed to become healthy"
          docker compose logs
          exit 1

      - name: Run smoke tests
        run: ./tools/test-endpoints.sh -v

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f compose.ci.yaml logs

      - name: Stop services
        if: always()
        run: docker compose -f compose.ci.yaml down
