name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: dev
          load: true
          tags: openconext-private-key-agent-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run checks (lint + static analysis + audit + tests)
        run: docker run --rm openconext-private-key-agent-app:latest composer check

  coverage:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: dev
          load: true
          tags: openconext-private-key-agent-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests with coverage
        run: |
          docker run --rm \
            -e XDEBUG_MODE=coverage \
            -v "${{ github.workspace }}/coverage:/var/www/html/var/coverage" \
            openconext-private-key-agent-app:latest \
            composer test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/clover.xml
          retention-days: 14

  smoke-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Set up dev environment (keys + config)
        run: ./tools/setup-dev.sh

      - name: Build and start services
        run: docker compose -f compose.ci.yaml up -d --build --wait

      - name: Wait for service to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/v1/health > /dev/null 2>&1; then
              echo "Service is healthy"
              exit 0
            fi
            echo "Waiting for service... ($i/30)"
            sleep 2
          done
          echo "Service failed to become healthy"
          docker compose logs
          exit 1

      - name: Run smoke tests
        run: ./tools/test-endpoints.sh -v

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f compose.ci.yaml logs

      - name: Stop services
        if: always()
        run: docker compose -f compose.ci.yaml down
